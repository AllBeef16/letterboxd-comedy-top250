name: On-Demand Top 250 Comedy

on:
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install base deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clone letterboxd-list-scraper
        run: |
          git clone https://github.com/L-Dot/Letterboxd-list-scraper.git

      - name: Run scraper & rank
        env:
          PYTHONPATH: ${{ github.workspace }}/Letterboxd-list-scraper
        run: |
          python scrape_and_rank.py

      
      - name: Peek scraper outputs (headers & first lines)
        run: |
          echo "== Files in Letterboxd-list-scraper/scraper_outputs =="
          ls -la Letterboxd-list-scraper/scraper_outputs || true

          echo "== Preview of first CSV (if any) =="
          first_csv=$(ls Letterboxd-list-scraper/scraper_outputs/*.csv 2>/dev/null | head -n 1)
          if [ -z "$first_csv" ]; then
            echo "No CSV files found in scraper_outputs."
          else
            echo "Showing first 20 lines of: $first_csv"
            head -n 20 "$first_csv"
          fi


      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: top250-comedy
          path: |
            top250_comedy.csv
            top250_comedy.json
